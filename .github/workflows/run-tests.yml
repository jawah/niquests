name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-22.04, macos-14, windows-latest]
        nox-session: ['']
        include:
          - python-version: "3.13"
            os: ubuntu-24.04
            nox-session: emscripten(node)
          - python-version: "3.13"
            os: ubuntu-24.04
            nox-session: emscripten(firefox)
          - python-version: "3.13"
            os: ubuntu-24.04
            nox-session: emscripten(chrome)
          - python-version: "pypy-3.11"
            os: ubuntu-24.04
            nox-session: "test-pypy3.11"
          - python-version: "pypy-3.11"
            os: windows-latest
            nox-session: "test-pypy3.11"
        exclude:
          - python-version: "3.7"
            os: macos-14

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        cache: 'pip'
    - name: "Install Chrome"
      uses: browser-actions/setup-chrome@b94431e051d1c52dcbe9a7092a4f10f827795416 # v2.1.0
      id: setup-chrome
      if: ${{ matrix.nox-session == 'emscripten(chrome)' }}
      with:
        install-chromedriver: true
    - name: Force override system chrome
      env:
        CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      run: |
        sudo rm -f /usr/bin/google-chrome
        sudo rm -f /usr/bin/chrome
        sudo ln -s $CHROME_PATH /usr/bin/google-chrome
        sudo ln -s $CHROME_PATH /usr/bin/chrome
        google-chrome --version
      if: ${{ matrix.nox-session == 'emscripten(chrome)' }}
    - name: "Install Firefox"
      uses: browser-actions/setup-firefox@5914774dda97099441f02628f8d46411fcfbd208 # v1.7.0
      if: ${{ matrix.nox-session == 'emscripten(firefox)' }}
    - name: "Install node.js"
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      if: ${{ matrix.nox-session == 'emscripten(node)' }}
      with:
        node-version: 24
    - name: Install dependencies
      run: |
        pip install nox
    - name: Run tests
      run: |
        nox -s "${{ matrix.nox-session != '' && matrix.nox-session || format('test-{0}', matrix.python-version) }}"
    - name: "Upload artifact"
      uses: "actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f"
      with:
        name: coverage-data-${{ matrix.os }}-${{ matrix.nox-session }}-${{ matrix.python-version }}-${{ matrix.traefik-server }}
        path: ".coverage.*"
        include-hidden-files: true
        if-no-files-found: error

  coverage:
    if: always()
    runs-on: "ubuntu-latest"
    needs: build
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8"
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: "actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405"
        with:
          python-version: "3.x"

      - name: "Install coverage"
        run: "python -m pip install --upgrade coverage"

      - name: "Download artifact"
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: coverage-data*
          merge-multiple: true

      - name: "Combine & check coverage"
        run: |
          python -m coverage combine
          python -m coverage html --skip-covered --skip-empty
          python -m coverage report --ignore-errors --show-missing --fail-under=70

      - name: "Upload report"
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: coverage-report
          path: htmlcov
